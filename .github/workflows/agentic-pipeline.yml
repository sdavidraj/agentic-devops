name: Agentic Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  agentic-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install app dependencies
        run: python -m pip install -r app/requirements.txt

      - name: Install pytest
        run: python -m pip install pytest

      - name: Run unit tests
        run: python -m pytest tests/

      - name: Build Docker image
        run: docker build -t checkout-service:latest -f Dockerfile .

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@0.28.0
        continue-on-error: true
        with:
          image-ref: checkout-service:latest
          format: table
          exit-code: "0"
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

      - name: Run agent orchestrator dry-run
        run: PYTHONPATH=. python agents/orchestrator.py --dry-run

      - name: Upload release notes
        if: ${{ always() && hashFiles('docs/release-notes.md') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: docs/release-notes.md
